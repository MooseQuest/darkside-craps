name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Build + test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Engine unit tests (JS)
        working-directory: web
        run: node --test

      - name: Build binary
        run: go build -o bin/darkside-craps .

      - name: Boot + smoke test against Mongo
        env:
          MONGO_URI: mongodb://localhost:27017
          SECRET_KEY: ci-only-not-secret
          RP_ID: localhost
          RP_ORIGIN: http://localhost:8080
          PORT: 8080
          MONGO_DB: craps_ci
        run: |
          set -e
          ./bin/darkside-craps > app.log 2>&1 &
          echo "APP_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if ! kill -0 $! 2>/dev/null; then echo "app died:"; cat app.log; exit 1; fi
            if curl -sf -o /dev/null http://127.0.0.1:8080/healthz; then echo "ready in ${i}s"; break; fi
            sleep 1
          done
          curl -sf -o /dev/null http://127.0.0.1:8080/healthz
          curl -sf -o /dev/null http://127.0.0.1:8080/
          curl -sf -o /dev/null http://127.0.0.1:8080/engine.js
          # anonymous register challenge must succeed
          curl -sf -X POST -H 'Content-Type: application/json' \
            -d '{"email":"ci@example.com"}' http://127.0.0.1:8080/auth/register/begin | grep -q publicKey
          echo "smoke OK"

      - name: Show app log on failure
        if: failure()
        run: cat app.log || true

      - name: Stop app
        if: always()
        run: kill ${APP_PID} 2>/dev/null || true

  deploy:
    name: Deploy to Heroku
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          set -e
          cat > "$HOME/.netrc" <<EOF
          machine git.heroku.com
            login git@heroku.com
            password $HEROKU_API_KEY
          EOF
          chmod 600 "$HOME/.netrc"
          git remote add heroku "https://git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku HEAD:main

      - name: Smoke test prod
        run: |
          set -e
          for i in $(seq 1 18); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://craps.moosequest.app/healthz")
            if [ "$CODE" = "200" ]; then echo "prod healthy after ${i}*5s"; exit 0; fi
            echo "attempt $i: HTTP $CODE"; sleep 5
          done
          echo "prod never healthy"; exit 1
