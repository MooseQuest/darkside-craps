name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Smoke test against vault-backed boot
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Boot Flask app and wait for HTTP 200
        env:
          # Local Mongo from the service container — no vault dependency for CI.
          # secrets_loader falls back to env when INFISICAL_CLIENT_ID is unset.
          MONGO_URI: mongodb://localhost:27017/
          SESSION_MONGO_URI: mongodb://localhost:27017/
          SECRET_KEY: ci-only-not-secret
          FLASK_ENV: development
          PORT: 5000
        run: |
          set -e
          python app.py > app.log 2>&1 &
          echo "APP_PID=$!" >> $GITHUB_ENV
          # Poll for readiness — fail fast if the process dies
          for i in $(seq 1 30); do
            if ! kill -0 $! 2>/dev/null; then
              echo "Flask process died before serving traffic"
              cat app.log
              exit 1
            fi
            if curl -sf -o /dev/null http://127.0.0.1:5000/; then
              echo "Flask ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Flask did not become ready in 30s"
          cat app.log
          exit 1

      - name: Run smoke tests
        env:
          CRAPS_URL: http://127.0.0.1:5000
        run: python test_craps_game.py

      - name: Show app log on failure
        if: failure()
        run: cat app.log || true

      - name: Stop Flask
        if: always()
        run: kill ${APP_PID} 2>/dev/null || true

      - name: Verify vault is reachable from CI
        env:
          INFISICAL_HOST: ${{ secrets.INFISICAL_HOST }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          python - <<'PY'
          import os, secrets_loader
          assert secrets_loader._vault_enabled(), "vault env vars missing"
          val = secrets_loader.load("MONGO_URI")
          assert val and val.startswith("mongodb"), f"unexpected MONGO_URI shape"
          print("OK: vault returned a valid MONGO_URI")
          PY

  deploy:
    name: Deploy to Heroku
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          set -e
          # netrc auth for git+https push to Heroku — avoids needing the heroku CLI on the runner
          cat > "$HOME/.netrc" <<EOF
          machine git.heroku.com
            login git@heroku.com
            password $HEROKU_API_KEY
          EOF
          chmod 600 "$HOME/.netrc"
          git remote add heroku "https://git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku HEAD:main

      - name: Smoke test prod
        run: |
          set -e
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://mq-craps-aca54a5fd2a3.herokuapp.com/")
            if [ "$CODE" = "200" ]; then
              echo "Prod returned HTTP 200 after ${i}*5s"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE"
            sleep 5
          done
          echo "Prod never returned 200 after 60s"
          exit 1
