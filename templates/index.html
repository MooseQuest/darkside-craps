<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Side Craps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0e2c;
            --bg-mid: #1a0f3a;
            --bg-glow: #2d0e4e;
            --neon-magenta: #ff00aa;
            --neon-magenta-soft: #ff44c4;
            --neon-cyan: #00ffe1;
            --neon-cyan-soft: #66fff0;
            --neon-yellow: #ffd000;
            --text-primary: #f0f4ff;
            --text-secondary: #8a93c2;
            --grid-line: rgba(0, 255, 225, 0.12);
            --panel-bg: rgba(13, 18, 56, 0.72);
            --panel-border: rgba(255, 0, 170, 0.35);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            color: var(--text-primary);
            background: radial-gradient(ellipse at top, var(--bg-glow) 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
            overflow-x: hidden;
        }

        /* Synthwave grid floor */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center bottom;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center bottom;
            mask-image: linear-gradient(to bottom, transparent 40%, black 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 40%, black 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Sun on the horizon */
        body::after {
            content: '';
            position: fixed;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 170, 0.55) 0%, rgba(255, 0, 170, 0.18) 35%, transparent 65%);
            filter: blur(20px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ---- Header ---- */
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(28px, 5vw, 48px);
            letter-spacing: 0.35em;
            text-align: center;
            margin: 0 0 4px;
            background: linear-gradient(180deg, #fff 0%, var(--neon-cyan) 50%, var(--neon-magenta) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow:
                0 0 20px rgba(255, 0, 170, 0.5),
                0 0 40px rgba(255, 0, 170, 0.25);
        }
        .brand-sub {
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 255, 225, 0.7);
            font-size: 12px;
            letter-spacing: 0.5em;
            margin: 0 0 32px;
            text-transform: uppercase;
        }

        /* ---- Panels ---- */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 18px 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow:
                0 0 24px rgba(255, 0, 170, 0.15),
                inset 0 0 30px rgba(0, 255, 225, 0.04);
        }
        .panel-cyan { border-color: rgba(0, 255, 225, 0.4); box-shadow: 0 0 24px rgba(0, 255, 225, 0.15), inset 0 0 30px rgba(0, 255, 225, 0.04); }
        .panel h2, .panel h3, .panel h4 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 12px;
            color: var(--neon-cyan);
            margin: 0 0 12px;
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.5);
        }

        /* ---- Form / start screen ---- */
        .start-card {
            max-width: 460px;
            margin: 64px auto 0;
            text-align: center;
        }
        .start-card label {
            display: block;
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        select, .neon-select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.1em;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(0, 255, 225, 0.6);
            box-shadow: 0 0 12px rgba(0, 255, 225, 0.25), inset 0 0 12px rgba(0, 255, 225, 0.08);
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><path fill='%2300ffe1' d='M4 6l4 4 4-4z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }
        select:focus { box-shadow: 0 0 18px rgba(0, 255, 225, 0.5); }

        /* ---- Buttons ---- */
        .btn-neon {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--neon-magenta) 0%, #b3007a 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
            box-shadow:
                0 0 16px rgba(255, 0, 170, 0.6),
                0 4px 0 #7a004f,
                inset 0 -2px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.06s ease, box-shadow 0.2s ease;
        }
        .btn-neon:hover {
            box-shadow:
                0 0 24px rgba(255, 0, 170, 0.85),
                0 4px 0 #7a004f,
                inset 0 -2px 0 rgba(0, 0, 0, 0.3);
        }
        .btn-neon:active {
            transform: translateY(2px);
            box-shadow:
                0 0 16px rgba(255, 0, 170, 0.5),
                0 2px 0 #7a004f,
                inset 0 -1px 0 rgba(0, 0, 0, 0.3);
        }
        .btn-neon-cyan {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #008c7a 100%);
            color: #001b1f;
            box-shadow:
                0 0 16px rgba(0, 255, 225, 0.6),
                0 4px 0 #00554b,
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
        }
        .btn-neon-cyan:hover {
            box-shadow:
                0 0 24px rgba(0, 255, 225, 0.85),
                0 4px 0 #00554b,
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            box-shadow: none;
            text-shadow: none;
        }
        .btn-ghost:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 255, 225, 0.3);
        }
        button { font-family: inherit; }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }

        /* ---- Game grid ---- */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 225, 0.3);
            border-radius: 4px;
            padding: 14px 16px;
            position: relative;
            overflow: hidden;
        }
        .stat::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 255, 225, 0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        .stat-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 255, 225, 0.5);
            letter-spacing: 0.05em;
        }
        .stat-value.magenta {
            color: var(--neon-magenta);
            text-shadow: 0 0 8px rgba(255, 0, 170, 0.5);
        }

        /* ---- Strikes display ---- */
        .strike-pips {
            display: inline-flex;
            gap: 6px;
            font-size: 22px;
            color: var(--neon-magenta);
            text-shadow: 0 0 8px rgba(255, 0, 170, 0.7);
            letter-spacing: 0.1em;
        }

        /* ---- Points pills ---- */
        .point {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            margin: 4px;
            background: rgba(0, 255, 225, 0.08);
            border: 2px solid var(--neon-cyan);
            border-radius: 6px;
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 18px;
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.7);
            box-shadow: 0 0 14px rgba(0, 255, 225, 0.35), inset 0 0 8px rgba(0, 255, 225, 0.1);
        }

        /* ---- Dice ---- */
        .dice-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 12px 0 20px;
            min-height: 96px;
        }
        .die {
            width: 80px;
            height: 80px;
            background: #0a0e2c;
            border: 2px solid var(--neon-magenta);
            border-radius: 12px;
            position: relative;
            box-shadow:
                0 0 20px rgba(255, 0, 170, 0.6),
                inset 0 0 20px rgba(255, 0, 170, 0.15);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            padding: 10px;
        }
        .die.rolling {
            animation: dieRoll 0.45s cubic-bezier(.36,.07,.19,.97);
        }
        @keyframes dieRoll {
            0%   { transform: rotate(0deg) scale(1); }
            25%  { transform: rotate(-90deg) scale(1.1); }
            50%  { transform: rotate(180deg) scale(0.95); }
            75%  { transform: rotate(270deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .pip {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
            align-self: center;
            justify-self: center;
        }
        .die-sum {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 0 0 12px rgba(255, 208, 0, 0.7);
            min-width: 60px;
            text-align: center;
        }

        /* ---- Status messages ---- */
        .status-block {
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.45);
            border-left: 3px solid var(--neon-magenta);
            border-radius: 0 4px 4px 0;
        }
        .status-block .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-magenta);
            text-shadow: 0 0 6px rgba(255, 0, 170, 0.5);
            margin-bottom: 6px;
        }
        .status-block .body {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .status-block.cyan { border-left-color: var(--neon-cyan); }
        .status-block.cyan .label {
            color: var(--neon-cyan);
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.5);
        }

        /* ---- Bet choice radios ---- */
        .bet-choices {
            display: inline-flex;
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .bet-choices input { display: none; }
        .bet-choices label {
            padding: 10px 22px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.15s;
            margin: 0;
        }
        .bet-choices input:checked + label {
            background: var(--neon-cyan);
            color: #001b1f;
            text-shadow: none;
            box-shadow: 0 0 12px rgba(0, 255, 225, 0.4);
        }

        /* ---- Roll log ---- */
        .roll-log {
            max-height: 260px;
            overflow-y: auto;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .roll-log p {
            margin: 4px 0;
            padding-bottom: 4px;
            border-bottom: 1px dotted rgba(0, 255, 225, 0.1);
        }
        .roll-log p:last-child {
            color: var(--neon-cyan);
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.4);
            border-bottom: none;
        }
        .roll-log::-webkit-scrollbar { width: 6px; }
        .roll-log::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .roll-log::-webkit-scrollbar-thumb { background: var(--neon-magenta); border-radius: 3px; }

        /* ---- Layout ---- */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 20px;
            margin-top: 16px;
        }
        @media (max-width: 800px) {
            .game-grid { grid-template-columns: 1fr; }
        }

        /* ---- Summary ---- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 2px solid var(--neon-cyan);
            border-radius: 0 4px 4px 0;
            font-size: 13px;
        }
        .summary-row .k { color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; }
        .summary-row .v { color: var(--neon-cyan); font-weight: 700; }

        /* ---- Spinner overlay ---- */
        .spinner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 44, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        .spinner-overlay.active { display: flex; }
        .spinner {
            width: 64px;
            height: 64px;
            border: 3px solid rgba(0, 255, 225, 0.15);
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-magenta);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            box-shadow: 0 0 24px rgba(255, 0, 170, 0.4);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- Walkthrough ---- */
        .wt-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 44, 0.65);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            z-index: 1500;
            display: none;
            opacity: 0;
            transition: opacity 0.18s ease;
            /* Visual dim only — spotlight + card draw above; clicks pass through
               to the page so the user can still interact with highlighted UI. */
            pointer-events: none;
        }
        .wt-overlay.active { display: block; opacity: 1; }

        /* "Spotlight" — a transparent ring that frames a target element */
        .wt-spotlight {
            position: fixed;
            border-radius: 8px;
            box-shadow:
                0 0 0 9999px rgba(10, 14, 44, 0.78),
                0 0 0 2px var(--neon-cyan),
                0 0 24px rgba(0, 255, 225, 0.5);
            z-index: 1501;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(.36,.07,.19,.97);
            display: none;
        }
        .wt-spotlight.active { display: block; }

        .wt-card {
            position: fixed;
            z-index: 1502;
            max-width: 380px;
            background: linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 100%);
            border: 1px solid var(--neon-magenta);
            border-radius: 8px;
            padding: 20px 22px;
            box-shadow:
                0 0 24px rgba(255, 0, 170, 0.5),
                inset 0 0 30px rgba(0, 255, 225, 0.06);
            display: none;
            font-family: 'JetBrains Mono', monospace;
        }
        .wt-card.active { display: block; }
        .wt-card.centered {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 460px;
        }
        .wt-card .wt-step {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-cyan);
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.5);
            margin-bottom: 6px;
        }
        .wt-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--neon-magenta);
            text-shadow: 0 0 10px rgba(255, 0, 170, 0.4);
            margin: 0 0 10px;
        }
        .wt-card .wt-body {
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.55;
            margin-bottom: 14px;
        }
        .wt-card .wt-body strong { color: var(--neon-cyan); font-weight: 700; }
        .wt-card .wt-body em { color: var(--neon-magenta); font-style: normal; font-weight: 700; }
        .wt-card .wt-body code {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(0, 255, 225, 0.25);
            color: var(--neon-cyan);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        .wt-card .wt-body .dice-row {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            justify-content: center;
            min-height: auto;
        }
        .wt-card .wt-body .die {
            width: 46px;
            height: 46px;
            padding: 6px;
            border-radius: 6px;
        }
        .wt-card .wt-body .pip { width: 7px; height: 7px; }
        .wt-card .wt-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        .wt-card .wt-progress {
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 0.2em;
        }
        .wt-card .wt-actions { display: flex; gap: 8px; }
        .wt-btn {
            padding: 8px 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid var(--text-secondary);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .wt-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 225, 0.3);
        }
        .wt-btn-primary {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            background: rgba(0, 255, 225, 0.08);
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.4);
        }
        .wt-btn-primary:hover {
            background: var(--neon-cyan);
            color: #001b1f;
            text-shadow: none;
        }
        .wt-card.await-action {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 24px rgba(255, 208, 0, 0.4);
        }
        .wt-card.await-action h3 { color: var(--neon-yellow); text-shadow: 0 0 10px rgba(255, 208, 0, 0.4); }
        .wt-card.await-action .wt-step { color: var(--neon-yellow); text-shadow: 0 0 6px rgba(255, 208, 0, 0.5); }

        /* "Need help?" pill in the corner */
        .wt-relaunch {
            position: fixed;
            bottom: 18px;
            right: 18px;
            z-index: 999;
            padding: 8px 14px;
            background: rgba(13, 18, 56, 0.85);
            border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 0 14px rgba(255, 0, 170, 0.3);
            transition: all 0.15s;
        }
        .wt-relaunch:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 14px rgba(0, 255, 225, 0.4);
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="brand">DARK·SIDE·CRAPS</h1>
        <p class="brand-sub">◆ DON'T PASS · LONG PLAY ·  STRATEGY ◆</p>

        <!-- ---------- START ---------- -->
        <form id="start-form" class="panel start-card">
            <h2>Initialize Session</h2>
            <label for="bankroll">Initial bankroll</label>
            <select id="bankroll" name="bankroll" required>
                <option value="1000">» $1,000</option>
                <option value="2000">» $2,000</option>
            </select>
            <div class="btn-row" style="justify-content:center; margin-top: 20px;">
                <button type="submit" class="btn-neon">▶ Start Game</button>
            </div>
        </form>

        <!-- ---------- GAME ---------- -->
        <div id="game-area" style="display:none;">
            <div class="stat-grid">
                <div class="stat">
                    <div class="stat-label">Bankroll</div>
                    <div class="stat-value" id="current-bankroll">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total Wagered</div>
                    <div class="stat-value magenta" id="total-wagered">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Current Bet</div>
                    <div class="stat-value" id="current-bets">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Strikes</div>
                    <div class="stat-value magenta"><span class="strike-pips" id="strikes">○ ○ ○</span></div>
                </div>
            </div>

            <div class="game-grid">
                <!-- LEFT: control + log -->
                <div>
                    <div class="panel panel-cyan">
                        <h3>Action</h3>
                        <div id="initial-bet" style="font-size:13px; color:var(--text-secondary); margin-bottom:14px;"></div>
                        <form id="roll-form">
                            <div class="bet-choices">
                                <input type="radio" id="bet" name="bet_choice" value="bet" checked>
                                <label for="bet">Bet</label>
                                <input type="radio" id="no_bet" name="bet_choice" value="no_bet">
                                <label for="no_bet">No Bet</label>
                            </div>
                            <div id="possible-outcomes" style="font-size:12px; color:var(--text-secondary); margin-bottom:14px;"></div>
                            <div class="btn-row">
                                <button type="submit" class="btn-neon">▶ Roll Dice</button>
                                <button type="button" id="show-summary-button" class="btn-neon btn-neon-cyan" style="display:none;">Show Summary</button>
                            </div>
                        </form>
                    </div>

                    <div class="panel">
                        <h3>Roll Log</h3>
                        <div id="results" class="roll-log"></div>
                    </div>
                </div>

                <!-- RIGHT: dice + table -->
                <div>
                    <div class="panel">
                        <h3>Last Roll</h3>
                        <div class="dice-row">
                            <div class="die" id="die-1"></div>
                            <div class="die-sum" id="dice-total">—</div>
                            <div class="die" id="die-2"></div>
                        </div>
                        <div style="text-align:center; color:var(--text-secondary); font-size:11px; letter-spacing:0.3em; text-transform:uppercase;">
                            <span id="dice-roll">awaiting roll</span>
                        </div>
                    </div>

                    <div class="panel panel-cyan">
                        <h3>Points Established</h3>
                        <div id="points-established" style="text-align:center; padding: 8px 0;">
                            <span style="color:var(--text-secondary); font-size:12px; letter-spacing:0.2em;">none yet</span>
                        </div>
                    </div>

                    <div class="status-block">
                        <div class="label">Next Action</div>
                        <div class="body" id="next-action-message">—</div>
                    </div>
                    <div class="status-block cyan">
                        <div class="label">Next Bet</div>
                        <div class="body" id="next-bet-message">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ---------- SUMMARY ---------- -->
        <div id="summary" class="panel" style="display:none;">
            <h2 style="font-size:16px;">Game Summary</h2>
            <div class="summary-grid" id="summary-results"></div>
            <div class="btn-row">
                <button id="continue-game-button" class="btn-neon btn-neon-cyan" style="display:none;">▶ Continue</button>
                <button id="reset-button" class="btn-neon" style="display:none;">↻ Reset</button>
                <button id="new-game-button" class="btn-neon btn-ghost">New Game</button>
            </div>
        </div>
    </div>

    <div class="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ---------- WALKTHROUGH ---------- -->
    <div class="wt-overlay" id="wt-overlay"></div>
    <div class="wt-spotlight" id="wt-spotlight"></div>
    <div class="wt-card" id="wt-card">
        <div class="wt-step" id="wt-step-label">Step 1 of —</div>
        <h3 id="wt-title">—</h3>
        <div class="wt-body" id="wt-body">—</div>
        <div class="wt-controls">
            <span class="wt-progress" id="wt-progress">— · —</span>
            <div class="wt-actions">
                <button type="button" class="wt-btn" id="wt-skip">Skip</button>
                <button type="button" class="wt-btn wt-btn-primary" id="wt-next">Next ▸</button>
            </div>
        </div>
    </div>
    <button type="button" class="wt-relaunch" id="wt-relaunch" title="Replay walkthrough">? Tour</button>

    <script>
    // ---------- die rendering helpers ----------
    // Pip layouts as 3x3 grids; values are "row col" pairs (1-indexed, CSS grid)
    const PIP_POSITIONS = {
        1: [[2,2]],
        2: [[1,1],[3,3]],
        3: [[1,1],[2,2],[3,3]],
        4: [[1,1],[1,3],[3,1],[3,3]],
        5: [[1,1],[1,3],[2,2],[3,1],[3,3]],
        6: [[1,1],[1,3],[2,1],[2,3],[3,1],[3,3]],
    };
    function renderDie(el, value) {
        el.innerHTML = '';
        (PIP_POSITIONS[value] || []).forEach(([r, c]) => {
            const pip = document.createElement('div');
            pip.className = 'pip';
            pip.style.gridRow = r;
            pip.style.gridColumn = c;
            el.appendChild(pip);
        });
    }
    function rollDieAnimation(el) {
        el.classList.remove('rolling');
        // force reflow so animation restarts
        void el.offsetWidth;
        el.classList.add('rolling');
    }
    function renderStrikes(n) {
        const filled = '●'.repeat(n);
        const empty = '○'.repeat(Math.max(0, 3 - n));
        return (filled + empty).split('').join(' ');
    }

    $(document).ready(function() {
        const socket = io.connect();

        function renderGameState(data) {
            if (data.dice_roll && data.roll_count !== undefined) {
                $('#results').append('<p>Roll ' + data.roll_count + ': [' + data.dice_roll.join(' · ') + '] = ' + data.roll_sum + '</p>');
            }
            if (data.status) $('#next-action-message').text(data.status);
            $('#next-bet-message').text(data.next_bet || '—');
            if (data.current_bets) {
                $('#current-bets').text('$' + data.current_bets.reduce((s, b) => s + b.bet, 0));
            }
            if (data.bankroll !== undefined) $('#current-bankroll').text('$' + data.bankroll.toLocaleString());
            if (data.total_wagered !== undefined) $('#total-wagered').text('$' + data.total_wagered.toLocaleString());
            if (data.established_points) {
                if (data.established_points.length === 0) {
                    $('#points-established').html('<span style="color:var(--text-secondary); font-size:12px; letter-spacing:0.2em;">none yet</span>');
                } else {
                    $('#points-established').html(
                        data.established_points.map(p => '<span class="point">' + p + '</span>').join('')
                    );
                }
            }
            if (data.dice_roll && data.dice_roll.length === 2) {
                const die1 = document.getElementById('die-1');
                const die2 = document.getElementById('die-2');
                rollDieAnimation(die1);
                rollDieAnimation(die2);
                // Update pips after the animation midpoint so the change feels intentional
                setTimeout(() => {
                    renderDie(die1, data.dice_roll[0]);
                    renderDie(die2, data.dice_roll[1]);
                }, 220);
                $('#dice-roll').text('Roll #' + data.roll_count);
                $('#dice-total').text(data.roll_sum);
            }
            if (data.strikes !== undefined) {
                $('#strikes').text(renderStrikes(data.strikes));
            }

            if (data.summary_button) $('#show-summary-button').show();
            if (data.continue_button) $('#continue-game-button').show();

            const log = document.getElementById('results');
            log.scrollTop = log.scrollHeight;
            $('.spinner-overlay').removeClass('active');
        }
        socket.on('update_game_state', renderGameState);

        function renderGameSummary(data) {
            const rows = [
                ['Initial Bankroll', '$' + (data.initial_bankroll || 0).toLocaleString()],
                ['Final Bankroll',   '$' + (data.final_bankroll || 0).toLocaleString()],
                ['Net',              (data.final_bankroll - data.initial_bankroll >= 0 ? '+' : '') + '$' + (data.final_bankroll - data.initial_bankroll).toLocaleString()],
                ['Roll Count',       data.roll_count || 0],
                ['Points Established', data.points_established || 0],
                ['Points Hit',       data.points_hit || 0],
                ['Wins',             '$' + (data.wins || 0).toLocaleString()],
                ['Losses',           '$' + (data.losses || 0).toLocaleString()],
                ['Strikes',          data.strikes || 0],
                ['Total Wagered',    '$' + (data.total_wagered || 0).toLocaleString()],
            ];
            $('#summary-results').html(
                rows.map(([k, v]) => '<div class="summary-row"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>').join('')
            );
            $('#summary').show();
            $('#game-area').hide();
            $('#show-summary-button').hide();
            $('#continue-game-button').show();
            $('#reset-button').show();
            $('.spinner-overlay').removeClass('active');
        }
        socket.on('update_game_summary', renderGameSummary);

        function updatePossibleOutcomes() {
            const choice = $('input[name="bet_choice"]:checked').val();
            $('#possible-outcomes').html(choice === 'bet'
                ? '7 / 11 → loss · 2 / 3 → win · 12 → push'
                : 'Observe roll only — no wager placed.');
        }

        function initGameUI(response) {
            $('#game-area').show();
            $('#start-form').hide();
            $('#summary').hide();
            $('#results').html('<p>━━━ Initial bankroll: $' + response.initial_bankroll.toLocaleString() + ' ━━━</p>');
            const initialBet = response.initial_bankroll == 1000 ? 25 : 50;
            $('#initial-bet').html('Initial Don\'t Pass bet: <span style="color:var(--neon-magenta);">−$' + initialBet + '</span>');
            $('#current-bets').text('$' + response.current_bets.reduce((s, b) => s + b.bet, 0));
            $('#total-wagered').text('$' + response.total_wagered.toLocaleString());
            $('#current-bankroll').text('$' + response.bankroll.toLocaleString());
            $('#next-action-message').text(response.status);
            $('#next-bet-message').text(response.next_bet || '—');
            $('#strikes').text(renderStrikes(0));
            $('#dice-total').text('—');
            $('#dice-roll').text('awaiting roll');
            renderDie(document.getElementById('die-1'), 1);
            renderDie(document.getElementById('die-2'), 1);
            $('#points-established').html('<span style="color:var(--text-secondary); font-size:12px; letter-spacing:0.2em;">none yet</span>');
            updatePossibleOutcomes();
        }

        $('#start-form').on('submit', function(event) {
            event.preventDefault();
            $.ajax({
                url: '/start',
                method: 'POST',
                data: $(this).serialize(),
                success: initGameUI,
                error: function() { alert('Failed to start game.'); }
            });
        });

        $('input[name="bet_choice"]').on('change', updatePossibleOutcomes);

        $('#roll-form').on('submit', function(event) {
            event.preventDefault();
            $('.spinner-overlay').addClass('active');
            $.ajax({
                url: '/roll',
                method: 'POST',
                data: $(this).serialize(),
                success: renderGameState,
                error: function() {
                    $('.spinner-overlay').removeClass('active');
                    alert('Roll failed. Try starting a new game.');
                }
            });
        });

        $('#show-summary-button').on('click', function() {
            $.ajax({ url: '/summary', method: 'GET', success: renderGameSummary });
        });

        $('#continue-game-button').on('click', function() {
            const bankrollText = $('#current-bankroll').text().replace(/[^0-9]/g, '');
            $.ajax({
                url: '/start',
                method: 'POST',
                data: { bankroll: bankrollText },
                success: function(response) {
                    initGameUI(response);
                    $('#show-summary-button').hide();
                    $('#continue-game-button').hide();
                    $('#reset-button').hide();
                }
            });
        });

        $('#reset-button').on('click', function() {
            $('#summary').hide();
            $('#start-form').show();
            $('#game-area').hide();
            $('#results').html('');
            $('#show-summary-button').hide();
            $('#continue-game-button').hide();
            $('#reset-button').hide();
        });

        $('#new-game-button').on('click', function() {
            $.ajax({
                url: '/summary',
                method: 'GET',
                success: function(response) {
                    if (response.final_bankroll <= 0.5 * response.initial_bankroll) {
                        alert('⚠ Walk away: bankroll is below 50% of initial.');
                    } else if (response.final_bankroll >= 1.2 * response.initial_bankroll) {
                        alert('✓ Walk away: bankroll is above 120% of initial.');
                    } else {
                        $('#summary').hide();
                        $('#start-form').show();
                        $('#game-area').hide();
                        $('#results').html('');
                        $('#show-summary-button').hide();
                        $('#continue-game-button').hide();
                        $('#reset-button').hide();
                    }
                }
            });
        });

        // ============================================================
        //                       WALKTHROUGH
        // ============================================================
        // Guided onboarding tour. Auto-launches on first visit, hides
        // permanently after the user finishes one full cycle. Click the
        // "? Tour" pill in the corner to replay.
        //
        // Each step:
        //   target?       — CSS selector to spotlight (omit for centered modal)
        //   title         — bold heading
        //   body          — HTML body copy
        //   placement?    — 'right' | 'left' | 'top' | 'bottom' (default 'bottom')
        //   awaitAction?  — { selector, event } — Next button hides; user must
        //                   trigger this event on the target to advance
        //   onEnter?      — function to run when step activates
        //   onExit?       — function to run when step advances
        //   when?         — function returning bool; step is skipped if false
        // ------------------------------------------------------------
        const WALKTHROUGH_KEY = 'darkside_walkthrough_v1_completed';

        const STEPS = [
            {
                title: '◆ Welcome to Dark Side Craps',
                body: `<p>This is a simulator for the <strong>Long Dark Side strategy</strong> — a disciplined approach to playing the <em>Don't Pass</em> line.</p>
                       <p>Most players bet <em>with</em> the shooter. The Dark Side bets <em>against</em> them: you win when the shooter rolls a 7 before repeating their point.</p>
                       <p style="color: var(--text-secondary); font-size: 12px;">Goal: stay at the table longer with smaller, steadier swings — not chase one big win.</p>`,
            },
            {
                target: '#bankroll',
                placement: 'bottom',
                title: 'Pick your bankroll',
                body: `<p>Start at <code>$1,000</code> or <code>$2,000</code>. Bet sizes scale to whichever you pick:</p>
                       <p style="font-size: 12px;">
                         <strong>$1,000:</strong> $25 Don't Pass · $30/$60/$90 lay bets<br>
                         <strong>$2,000:</strong> $50 Don't Pass · $60/$75/$100 lay bets
                       </p>
                       <p>Larger bankroll = more cushion, longer expected play.</p>`,
            },
            {
                target: '#start-form button[type="submit"]',
                placement: 'top',
                title: 'Place the opening bet',
                body: `<p>Clicking <strong>Start Game</strong> places your initial <em>Don't Pass</em> bet on the come-out roll.</p>
                       <p style="font-size: 12px;">Click it now to begin.</p>`,
                awaitAction: { selector: '#start-form', event: 'submit' },
            },
            {
                target: '.stat-grid',
                placement: 'bottom',
                title: 'Your scoreboard',
                body: `<p>Four numbers tell you everything:</p>
                       <ul style="font-size: 12px; padding-left: 18px; margin: 8px 0;">
                         <li><strong>Bankroll</strong> — what you've got left</li>
                         <li><strong>Total Wagered</strong> — total cash put on the felt</li>
                         <li><strong>Current Bet</strong> — money currently exposed on the table</li>
                         <li><strong>Strikes</strong> — points the shooter has hit (3 = stop placing new bets)</li>
                       </ul>`,
                when: () => $('#game-area').is(':visible'),
            },
            {
                target: '#dice-total',
                placement: 'left',
                title: 'Reading the dice',
                body: `<div class="dice-row">
                          <div class="die" id="wt-die-demo-1"></div>
                          <div class="die" id="wt-die-demo-2"></div>
                       </div>
                       <p><strong>Come-out roll outcomes:</strong></p>
                       <ul style="font-size: 12px; padding-left: 18px; margin: 8px 0;">
                         <li><em>7 or 11</em> → you <strong>lose</strong> Don't Pass</li>
                         <li><em>2 or 3</em> → you <strong>win</strong> Don't Pass</li>
                         <li><em>12</em> → push (no change)</li>
                         <li><em>4, 5, 6, 8, 9, 10</em> → that becomes the <strong>point</strong></li>
                       </ul>`,
                onEnter: () => {
                    setTimeout(() => {
                        if (window.renderDie) {
                            window.renderDie(document.getElementById('wt-die-demo-1'), 3);
                            window.renderDie(document.getElementById('wt-die-demo-2'), 4);
                        }
                    }, 50);
                },
                when: () => $('#game-area').is(':visible'),
            },
            {
                target: '#roll-form button[type="submit"]',
                placement: 'top',
                title: 'Roll the dice',
                body: `<p>Click <strong>Roll Dice</strong> to throw. Watch what happens to the bankroll, current bet, and any new point.</p>
                       <p style="font-size: 12px;">Try it now.</p>`,
                awaitAction: { selector: '#roll-form', event: 'submit' },
                when: () => $('#game-area').is(':visible'),
            },
            {
                target: '#points-established',
                placement: 'left',
                title: 'Why we lay odds',
                body: `<p>Whenever a number 4 / 5 / 6 / 8 / 9 / 10 rolls, it becomes a <strong>point</strong>. We immediately place a <em>Lay Odds</em> bet behind it.</p>
                       <p style="font-size: 12px;">Lay Odds win when the shooter rolls a <strong>7 before</strong> repeating that point. The longer points stack up, the bigger the 7-out payday.</p>
                       <p style="font-size: 12px; color: var(--text-secondary);">"Next Bet" tells you the lay amount for the current point.</p>`,
                when: () => $('#game-area').is(':visible'),
            },
            {
                target: '#strikes',
                placement: 'bottom',
                title: 'The 3-strike rule',
                body: `<p>Every time a point <em>repeats</em> before a 7, that's a <strong>strike</strong>. You lose that lay-odds bet.</p>
                       <p style="font-size: 12px;">Three strikes? <strong>Stop placing new Don't Come bets.</strong> Wait for a 7 before re-engaging. This is the discipline that keeps the bankroll alive.</p>`,
                when: () => $('#game-area').is(':visible'),
            },
            {
                title: '✓ When to walk away',
                body: `<p>Two thresholds end the session:</p>
                       <ul style="font-size: 13px; padding-left: 18px;">
                         <li>Bankroll drops <strong>below 50%</strong> of starting → walk away (preserve capital)</li>
                         <li>Bankroll climbs <strong>above 120%</strong> of starting → walk away (lock in the win)</li>
                       </ul>
                       <p style="font-size: 12px; color: var(--text-secondary);">The simulator warns you when you hit either bound.</p>`,
            },
            {
                title: '◆ You\'re ready',
                body: `<p>That's the whole strategy:</p>
                       <p style="font-size: 13px;">
                         <strong>Bet Don't Pass</strong> → <strong>lay odds on points</strong> → <strong>wait for the 7</strong> → <strong>walk when limits hit</strong>.
                       </p>
                       <p style="font-size: 12px; color: var(--text-secondary);">This walkthrough won't show again. Tap the <strong style="color: var(--neon-magenta);">? Tour</strong> pill in the corner to replay.</p>`,
                onExit: () => { try { localStorage.setItem(WALKTHROUGH_KEY, '1'); } catch (e) {} },
            },
        ];

        let wtIndex = 0;
        let wtAwaitHandler = null;

        function wtPositionCard(target, placement) {
            const card = document.getElementById('wt-card');
            const spot = document.getElementById('wt-spotlight');
            card.classList.remove('centered');

            if (!target) {
                spot.classList.remove('active');
                card.classList.add('centered');
                card.style.top = ''; card.style.left = ''; card.style.transform = '';
                return;
            }

            const el = document.querySelector(target);
            if (!el) {
                // Target missing — fall back to centered
                spot.classList.remove('active');
                card.classList.add('centered');
                return;
            }

            const r = el.getBoundingClientRect();
            const PAD = 8;
            spot.style.top = (r.top - PAD) + 'px';
            spot.style.left = (r.left - PAD) + 'px';
            spot.style.width = (r.width + PAD * 2) + 'px';
            spot.style.height = (r.height + PAD * 2) + 'px';
            spot.classList.add('active');

            // Position the card adjacent to the target
            const cardW = 380, cardH = card.offsetHeight || 240, GAP = 16;
            let top, left;
            switch (placement) {
                case 'top':
                    top = r.top - cardH - GAP;
                    left = r.left + r.width / 2 - cardW / 2;
                    break;
                case 'left':
                    top = r.top + r.height / 2 - cardH / 2;
                    left = r.left - cardW - GAP;
                    break;
                case 'right':
                    top = r.top + r.height / 2 - cardH / 2;
                    left = r.right + GAP;
                    break;
                case 'bottom':
                default:
                    top = r.bottom + GAP;
                    left = r.left + r.width / 2 - cardW / 2;
            }
            // Clamp to viewport
            const maxLeft = window.innerWidth - cardW - 12;
            const maxTop = window.innerHeight - cardH - 12;
            top = Math.max(12, Math.min(maxTop, top));
            left = Math.max(12, Math.min(maxLeft, left));
            card.style.top = top + 'px';
            card.style.left = left + 'px';
            card.style.transform = 'none';
        }

        function wtRenderStep(idx) {
            // Skip steps whose `when` returns false
            while (idx < STEPS.length && STEPS[idx].when && !STEPS[idx].when()) {
                idx++;
            }
            if (idx >= STEPS.length) {
                wtFinish(true);
                return;
            }
            wtIndex = idx;
            const s = STEPS[idx];
            $('#wt-step-label').text('Step ' + (idx + 1) + ' of ' + STEPS.length);
            $('#wt-progress').text((idx + 1) + ' · ' + STEPS.length);
            $('#wt-title').html(s.title);
            $('#wt-body').html(s.body);

            const card = $('#wt-card');
            card.toggleClass('await-action', !!s.awaitAction);
            $('#wt-next').toggle(!s.awaitAction);

            // Render BEFORE positioning so card height is correct
            $('#wt-overlay').addClass('active');
            card.addClass('active');

            // Defer positioning until layout settles
            requestAnimationFrame(() => wtPositionCard(s.target, s.placement));

            if (s.onEnter) s.onEnter();

            if (wtAwaitHandler) {
                wtAwaitHandler.off();
                wtAwaitHandler = null;
            }
            if (s.awaitAction) {
                const $el = $(s.awaitAction.selector);
                wtAwaitHandler = $el;
                $el.one(s.awaitAction.event, function () {
                    setTimeout(() => wtNext(), 350);
                });
            }
        }

        function wtNext() {
            const cur = STEPS[wtIndex];
            if (cur && cur.onExit) cur.onExit();
            wtRenderStep(wtIndex + 1);
        }

        function wtFinish(markCompleted) {
            $('#wt-overlay').removeClass('active');
            $('#wt-card').removeClass('active');
            $('#wt-spotlight').removeClass('active');
            if (wtAwaitHandler) { wtAwaitHandler.off(); wtAwaitHandler = null; }
            if (markCompleted) {
                try { localStorage.setItem(WALKTHROUGH_KEY, '1'); } catch (e) {}
            }
        }

        function wtStart() {
            wtIndex = 0;
            wtRenderStep(0);
        }

        $('#wt-next').on('click', wtNext);
        $('#wt-skip').on('click', () => wtFinish(true));
        $('#wt-relaunch').on('click', wtStart);

        // Reposition on window resize / scroll
        window.addEventListener('resize', () => {
            const s = STEPS[wtIndex];
            if (s && $('#wt-card').hasClass('active')) wtPositionCard(s.target, s.placement);
        });
        window.addEventListener('scroll', () => {
            const s = STEPS[wtIndex];
            if (s && s.target && $('#wt-card').hasClass('active')) wtPositionCard(s.target, s.placement);
        }, { passive: true });

        // Auto-launch for first-time visitors
        try {
            if (!localStorage.getItem(WALKTHROUGH_KEY)) {
                setTimeout(wtStart, 400);
            }
        } catch (e) { /* localStorage blocked → skip auto-launch */ }

        // Expose helpers for the walkthrough demo dice
        window.renderDie = renderDie;
    });
    </script>
</body>
</html>
