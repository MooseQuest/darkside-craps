<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Side Craps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0e2c;
            --bg-mid: #1a0f3a;
            --bg-glow: #2d0e4e;
            --neon-magenta: #ff00aa;
            --neon-magenta-soft: #ff44c4;
            --neon-cyan: #00ffe1;
            --neon-cyan-soft: #66fff0;
            --neon-yellow: #ffd000;
            --text-primary: #f0f4ff;
            --text-secondary: #8a93c2;
            --grid-line: rgba(0, 255, 225, 0.12);
            --panel-bg: rgba(13, 18, 56, 0.72);
            --panel-border: rgba(255, 0, 170, 0.35);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            color: var(--text-primary);
            background: radial-gradient(ellipse at top, var(--bg-glow) 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
            overflow-x: hidden;
        }

        /* Synthwave grid floor */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center bottom;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center bottom;
            mask-image: linear-gradient(to bottom, transparent 40%, black 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 40%, black 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Sun on the horizon */
        body::after {
            content: '';
            position: fixed;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 170, 0.55) 0%, rgba(255, 0, 170, 0.18) 35%, transparent 65%);
            filter: blur(20px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ---- Header ---- */
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(28px, 5vw, 48px);
            letter-spacing: 0.35em;
            text-align: center;
            margin: 0 0 4px;
            background: linear-gradient(180deg, #fff 0%, var(--neon-cyan) 50%, var(--neon-magenta) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow:
                0 0 20px rgba(255, 0, 170, 0.5),
                0 0 40px rgba(255, 0, 170, 0.25);
        }
        .brand-sub {
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 255, 225, 0.7);
            font-size: 12px;
            letter-spacing: 0.5em;
            margin: 0 0 32px;
            text-transform: uppercase;
        }

        /* ---- Panels ---- */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 18px 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow:
                0 0 24px rgba(255, 0, 170, 0.15),
                inset 0 0 30px rgba(0, 255, 225, 0.04);
        }
        .panel-cyan { border-color: rgba(0, 255, 225, 0.4); box-shadow: 0 0 24px rgba(0, 255, 225, 0.15), inset 0 0 30px rgba(0, 255, 225, 0.04); }
        .panel h2, .panel h3, .panel h4 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 12px;
            color: var(--neon-cyan);
            margin: 0 0 12px;
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.5);
        }

        /* ---- Form / start screen ---- */
        .start-card {
            max-width: 460px;
            margin: 64px auto 0;
            text-align: center;
        }
        .start-card label {
            display: block;
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        select, .neon-select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.1em;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(0, 255, 225, 0.6);
            box-shadow: 0 0 12px rgba(0, 255, 225, 0.25), inset 0 0 12px rgba(0, 255, 225, 0.08);
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><path fill='%2300ffe1' d='M4 6l4 4 4-4z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }
        select:focus { box-shadow: 0 0 18px rgba(0, 255, 225, 0.5); }

        /* ---- Buttons ---- */
        .btn-neon {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--neon-magenta) 0%, #b3007a 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
            box-shadow:
                0 0 16px rgba(255, 0, 170, 0.6),
                0 4px 0 #7a004f,
                inset 0 -2px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.06s ease, box-shadow 0.2s ease;
        }
        .btn-neon:hover {
            box-shadow:
                0 0 24px rgba(255, 0, 170, 0.85),
                0 4px 0 #7a004f,
                inset 0 -2px 0 rgba(0, 0, 0, 0.3);
        }
        .btn-neon:active {
            transform: translateY(2px);
            box-shadow:
                0 0 16px rgba(255, 0, 170, 0.5),
                0 2px 0 #7a004f,
                inset 0 -1px 0 rgba(0, 0, 0, 0.3);
        }
        .btn-neon-cyan {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #008c7a 100%);
            color: #001b1f;
            box-shadow:
                0 0 16px rgba(0, 255, 225, 0.6),
                0 4px 0 #00554b,
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
        }
        .btn-neon-cyan:hover {
            box-shadow:
                0 0 24px rgba(0, 255, 225, 0.85),
                0 4px 0 #00554b,
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            box-shadow: none;
            text-shadow: none;
        }
        .btn-ghost:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 255, 225, 0.3);
        }
        button { font-family: inherit; }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }

        /* ---- Game grid ---- */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 225, 0.3);
            border-radius: 4px;
            padding: 14px 16px;
            position: relative;
            overflow: hidden;
        }
        .stat::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 255, 225, 0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        .stat-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 255, 225, 0.5);
            letter-spacing: 0.05em;
        }
        .stat-value.magenta {
            color: var(--neon-magenta);
            text-shadow: 0 0 8px rgba(255, 0, 170, 0.5);
        }

        /* ---- Strikes display ---- */
        .strike-pips {
            display: inline-flex;
            gap: 6px;
            font-size: 22px;
            color: var(--neon-magenta);
            text-shadow: 0 0 8px rgba(255, 0, 170, 0.7);
            letter-spacing: 0.1em;
        }

        /* ---- Points pills ---- */
        .point {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            margin: 4px;
            background: rgba(0, 255, 225, 0.08);
            border: 2px solid var(--neon-cyan);
            border-radius: 6px;
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 18px;
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.7);
            box-shadow: 0 0 14px rgba(0, 255, 225, 0.35), inset 0 0 8px rgba(0, 255, 225, 0.1);
        }

        /* ---- Dice ---- */
        .dice-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin: 12px 0 20px;
            min-height: 96px;
        }
        .die {
            width: 80px;
            height: 80px;
            background: #0a0e2c;
            border: 2px solid var(--neon-magenta);
            border-radius: 12px;
            position: relative;
            box-shadow:
                0 0 20px rgba(255, 0, 170, 0.6),
                inset 0 0 20px rgba(255, 0, 170, 0.15);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            padding: 10px;
        }
        .die.rolling {
            animation: dieRoll 0.45s cubic-bezier(.36,.07,.19,.97);
        }
        @keyframes dieRoll {
            0%   { transform: rotate(0deg) scale(1); }
            25%  { transform: rotate(-90deg) scale(1.1); }
            50%  { transform: rotate(180deg) scale(0.95); }
            75%  { transform: rotate(270deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .pip {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
            align-self: center;
            justify-self: center;
        }
        .die-sum {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 0 0 12px rgba(255, 208, 0, 0.7);
            min-width: 60px;
            text-align: center;
        }

        /* ---- Status messages ---- */
        .status-block {
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.45);
            border-left: 3px solid var(--neon-magenta);
            border-radius: 0 4px 4px 0;
        }
        .status-block .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--neon-magenta);
            text-shadow: 0 0 6px rgba(255, 0, 170, 0.5);
            margin-bottom: 6px;
        }
        .status-block .body {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .status-block.cyan { border-left-color: var(--neon-cyan); }
        .status-block.cyan .label {
            color: var(--neon-cyan);
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.5);
        }

        /* ---- Bet choice radios ---- */
        .bet-choices {
            display: inline-flex;
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .bet-choices input { display: none; }
        .bet-choices label {
            padding: 10px 22px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.15s;
            margin: 0;
        }
        .bet-choices input:checked + label {
            background: var(--neon-cyan);
            color: #001b1f;
            text-shadow: none;
            box-shadow: 0 0 12px rgba(0, 255, 225, 0.4);
        }

        /* ---- Roll log ---- */
        .roll-log {
            max-height: 260px;
            overflow-y: auto;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .roll-log p {
            margin: 4px 0;
            padding-bottom: 4px;
            border-bottom: 1px dotted rgba(0, 255, 225, 0.1);
        }
        .roll-log p:last-child {
            color: var(--neon-cyan);
            text-shadow: 0 0 6px rgba(0, 255, 225, 0.4);
            border-bottom: none;
        }
        .roll-log::-webkit-scrollbar { width: 6px; }
        .roll-log::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .roll-log::-webkit-scrollbar-thumb { background: var(--neon-magenta); border-radius: 3px; }

        /* ---- Layout ---- */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 20px;
            margin-top: 16px;
        }
        @media (max-width: 800px) {
            .game-grid { grid-template-columns: 1fr; }
        }

        /* ---- Summary ---- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 2px solid var(--neon-cyan);
            border-radius: 0 4px 4px 0;
            font-size: 13px;
        }
        .summary-row .k { color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; }
        .summary-row .v { color: var(--neon-cyan); font-weight: 700; }

        /* ---- Spinner overlay ---- */
        .spinner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 44, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        .spinner-overlay.active { display: flex; }
        .spinner {
            width: 64px;
            height: 64px;
            border: 3px solid rgba(0, 255, 225, 0.15);
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-magenta);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            box-shadow: 0 0 24px rgba(255, 0, 170, 0.4);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="brand">DARK·SIDE·CRAPS</h1>
        <p class="brand-sub">◆ DON'T PASS · LONG PLAY ·  STRATEGY ◆</p>

        <!-- ---------- START ---------- -->
        <form id="start-form" class="panel start-card">
            <h2>Initialize Session</h2>
            <label for="bankroll">Initial bankroll</label>
            <select id="bankroll" name="bankroll" required>
                <option value="1000">» $1,000</option>
                <option value="2000">» $2,000</option>
            </select>
            <div class="btn-row" style="justify-content:center; margin-top: 20px;">
                <button type="submit" class="btn-neon">▶ Start Game</button>
            </div>
        </form>

        <!-- ---------- GAME ---------- -->
        <div id="game-area" style="display:none;">
            <div class="stat-grid">
                <div class="stat">
                    <div class="stat-label">Bankroll</div>
                    <div class="stat-value" id="current-bankroll">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total Wagered</div>
                    <div class="stat-value magenta" id="total-wagered">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Current Bet</div>
                    <div class="stat-value" id="current-bets">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Strikes</div>
                    <div class="stat-value magenta"><span class="strike-pips" id="strikes">○ ○ ○</span></div>
                </div>
            </div>

            <div class="game-grid">
                <!-- LEFT: control + log -->
                <div>
                    <div class="panel panel-cyan">
                        <h3>Action</h3>
                        <div id="initial-bet" style="font-size:13px; color:var(--text-secondary); margin-bottom:14px;"></div>
                        <form id="roll-form">
                            <div class="bet-choices">
                                <input type="radio" id="bet" name="bet_choice" value="bet" checked>
                                <label for="bet">Bet</label>
                                <input type="radio" id="no_bet" name="bet_choice" value="no_bet">
                                <label for="no_bet">No Bet</label>
                            </div>
                            <div id="possible-outcomes" style="font-size:12px; color:var(--text-secondary); margin-bottom:14px;"></div>
                            <div class="btn-row">
                                <button type="submit" class="btn-neon">▶ Roll Dice</button>
                                <button type="button" id="show-summary-button" class="btn-neon btn-neon-cyan" style="display:none;">Show Summary</button>
                            </div>
                        </form>
                    </div>

                    <div class="panel">
                        <h3>Roll Log</h3>
                        <div id="results" class="roll-log"></div>
                    </div>
                </div>

                <!-- RIGHT: dice + table -->
                <div>
                    <div class="panel">
                        <h3>Last Roll</h3>
                        <div class="dice-row">
                            <div class="die" id="die-1"></div>
                            <div class="die-sum" id="dice-total">—</div>
                            <div class="die" id="die-2"></div>
                        </div>
                        <div style="text-align:center; color:var(--text-secondary); font-size:11px; letter-spacing:0.3em; text-transform:uppercase;">
                            <span id="dice-roll">awaiting roll</span>
                        </div>
                    </div>

                    <div class="panel panel-cyan">
                        <h3>Points Established</h3>
                        <div id="points-established" style="text-align:center; padding: 8px 0;">
                            <span style="color:var(--text-secondary); font-size:12px; letter-spacing:0.2em;">none yet</span>
                        </div>
                    </div>

                    <div class="status-block">
                        <div class="label">Next Action</div>
                        <div class="body" id="next-action-message">—</div>
                    </div>
                    <div class="status-block cyan">
                        <div class="label">Next Bet</div>
                        <div class="body" id="next-bet-message">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ---------- SUMMARY ---------- -->
        <div id="summary" class="panel" style="display:none;">
            <h2 style="font-size:16px;">Game Summary</h2>
            <div class="summary-grid" id="summary-results"></div>
            <div class="btn-row">
                <button id="continue-game-button" class="btn-neon btn-neon-cyan" style="display:none;">▶ Continue</button>
                <button id="reset-button" class="btn-neon" style="display:none;">↻ Reset</button>
                <button id="new-game-button" class="btn-neon btn-ghost">New Game</button>
            </div>
        </div>
    </div>

    <div class="spinner-overlay">
        <div class="spinner"></div>
    </div>

    <script>
    // ---------- die rendering helpers ----------
    // Pip layouts as 3x3 grids; values are "row col" pairs (1-indexed, CSS grid)
    const PIP_POSITIONS = {
        1: [[2,2]],
        2: [[1,1],[3,3]],
        3: [[1,1],[2,2],[3,3]],
        4: [[1,1],[1,3],[3,1],[3,3]],
        5: [[1,1],[1,3],[2,2],[3,1],[3,3]],
        6: [[1,1],[1,3],[2,1],[2,3],[3,1],[3,3]],
    };
    function renderDie(el, value) {
        el.innerHTML = '';
        (PIP_POSITIONS[value] || []).forEach(([r, c]) => {
            const pip = document.createElement('div');
            pip.className = 'pip';
            pip.style.gridRow = r;
            pip.style.gridColumn = c;
            el.appendChild(pip);
        });
    }
    function rollDieAnimation(el) {
        el.classList.remove('rolling');
        // force reflow so animation restarts
        void el.offsetWidth;
        el.classList.add('rolling');
    }
    function renderStrikes(n) {
        const filled = '●'.repeat(n);
        const empty = '○'.repeat(Math.max(0, 3 - n));
        return (filled + empty).split('').join(' ');
    }

    $(document).ready(function() {
        const socket = io.connect();

        function renderGameState(data) {
            if (data.dice_roll && data.roll_count !== undefined) {
                $('#results').append('<p>Roll ' + data.roll_count + ': [' + data.dice_roll.join(' · ') + '] = ' + data.roll_sum + '</p>');
            }
            if (data.status) $('#next-action-message').text(data.status);
            $('#next-bet-message').text(data.next_bet || '—');
            if (data.current_bets) {
                $('#current-bets').text('$' + data.current_bets.reduce((s, b) => s + b.bet, 0));
            }
            if (data.bankroll !== undefined) $('#current-bankroll').text('$' + data.bankroll.toLocaleString());
            if (data.total_wagered !== undefined) $('#total-wagered').text('$' + data.total_wagered.toLocaleString());
            if (data.established_points) {
                if (data.established_points.length === 0) {
                    $('#points-established').html('<span style="color:var(--text-secondary); font-size:12px; letter-spacing:0.2em;">none yet</span>');
                } else {
                    $('#points-established').html(
                        data.established_points.map(p => '<span class="point">' + p + '</span>').join('')
                    );
                }
            }
            if (data.dice_roll && data.dice_roll.length === 2) {
                const die1 = document.getElementById('die-1');
                const die2 = document.getElementById('die-2');
                rollDieAnimation(die1);
                rollDieAnimation(die2);
                // Update pips after the animation midpoint so the change feels intentional
                setTimeout(() => {
                    renderDie(die1, data.dice_roll[0]);
                    renderDie(die2, data.dice_roll[1]);
                }, 220);
                $('#dice-roll').text('Roll #' + data.roll_count);
                $('#dice-total').text(data.roll_sum);
            }
            if (data.strikes !== undefined) {
                $('#strikes').text(renderStrikes(data.strikes));
            }

            if (data.summary_button) $('#show-summary-button').show();
            if (data.continue_button) $('#continue-game-button').show();

            const log = document.getElementById('results');
            log.scrollTop = log.scrollHeight;
            $('.spinner-overlay').removeClass('active');
        }
        socket.on('update_game_state', renderGameState);

        function renderGameSummary(data) {
            const rows = [
                ['Initial Bankroll', '$' + (data.initial_bankroll || 0).toLocaleString()],
                ['Final Bankroll',   '$' + (data.final_bankroll || 0).toLocaleString()],
                ['Net',              (data.final_bankroll - data.initial_bankroll >= 0 ? '+' : '') + '$' + (data.final_bankroll - data.initial_bankroll).toLocaleString()],
                ['Roll Count',       data.roll_count || 0],
                ['Points Established', data.points_established || 0],
                ['Points Hit',       data.points_hit || 0],
                ['Wins',             '$' + (data.wins || 0).toLocaleString()],
                ['Losses',           '$' + (data.losses || 0).toLocaleString()],
                ['Strikes',          data.strikes || 0],
                ['Total Wagered',    '$' + (data.total_wagered || 0).toLocaleString()],
            ];
            $('#summary-results').html(
                rows.map(([k, v]) => '<div class="summary-row"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>').join('')
            );
            $('#summary').show();
            $('#game-area').hide();
            $('#show-summary-button').hide();
            $('#continue-game-button').show();
            $('#reset-button').show();
            $('.spinner-overlay').removeClass('active');
        }
        socket.on('update_game_summary', renderGameSummary);

        function updatePossibleOutcomes() {
            const choice = $('input[name="bet_choice"]:checked').val();
            $('#possible-outcomes').html(choice === 'bet'
                ? '7 / 11 → loss · 2 / 3 → win · 12 → push'
                : 'Observe roll only — no wager placed.');
        }

        function initGameUI(response) {
            $('#game-area').show();
            $('#start-form').hide();
            $('#summary').hide();
            $('#results').html('<p>━━━ Initial bankroll: $' + response.initial_bankroll.toLocaleString() + ' ━━━</p>');
            const initialBet = response.initial_bankroll == 1000 ? 25 : 50;
            $('#initial-bet').html('Initial Don\'t Pass bet: <span style="color:var(--neon-magenta);">−$' + initialBet + '</span>');
            $('#current-bets').text('$' + response.current_bets.reduce((s, b) => s + b.bet, 0));
            $('#total-wagered').text('$' + response.total_wagered.toLocaleString());
            $('#current-bankroll').text('$' + response.bankroll.toLocaleString());
            $('#next-action-message').text(response.status);
            $('#next-bet-message').text(response.next_bet || '—');
            $('#strikes').text(renderStrikes(0));
            $('#dice-total').text('—');
            $('#dice-roll').text('awaiting roll');
            renderDie(document.getElementById('die-1'), 1);
            renderDie(document.getElementById('die-2'), 1);
            $('#points-established').html('<span style="color:var(--text-secondary); font-size:12px; letter-spacing:0.2em;">none yet</span>');
            updatePossibleOutcomes();
        }

        $('#start-form').on('submit', function(event) {
            event.preventDefault();
            $.ajax({
                url: '/start',
                method: 'POST',
                data: $(this).serialize(),
                success: initGameUI,
                error: function() { alert('Failed to start game.'); }
            });
        });

        $('input[name="bet_choice"]').on('change', updatePossibleOutcomes);

        $('#roll-form').on('submit', function(event) {
            event.preventDefault();
            $('.spinner-overlay').addClass('active');
            $.ajax({
                url: '/roll',
                method: 'POST',
                data: $(this).serialize(),
                success: renderGameState,
                error: function() {
                    $('.spinner-overlay').removeClass('active');
                    alert('Roll failed. Try starting a new game.');
                }
            });
        });

        $('#show-summary-button').on('click', function() {
            $.ajax({ url: '/summary', method: 'GET', success: renderGameSummary });
        });

        $('#continue-game-button').on('click', function() {
            const bankrollText = $('#current-bankroll').text().replace(/[^0-9]/g, '');
            $.ajax({
                url: '/start',
                method: 'POST',
                data: { bankroll: bankrollText },
                success: function(response) {
                    initGameUI(response);
                    $('#show-summary-button').hide();
                    $('#continue-game-button').hide();
                    $('#reset-button').hide();
                }
            });
        });

        $('#reset-button').on('click', function() {
            $('#summary').hide();
            $('#start-form').show();
            $('#game-area').hide();
            $('#results').html('');
            $('#show-summary-button').hide();
            $('#continue-game-button').hide();
            $('#reset-button').hide();
        });

        $('#new-game-button').on('click', function() {
            $.ajax({
                url: '/summary',
                method: 'GET',
                success: function(response) {
                    if (response.final_bankroll <= 0.5 * response.initial_bankroll) {
                        alert('⚠ Walk away: bankroll is below 50% of initial.');
                    } else if (response.final_bankroll >= 1.2 * response.initial_bankroll) {
                        alert('✓ Walk away: bankroll is above 120% of initial.');
                    } else {
                        $('#summary').hide();
                        $('#start-form').show();
                        $('#game-area').hide();
                        $('#results').html('');
                        $('#show-summary-button').hide();
                        $('#continue-game-button').hide();
                        $('#reset-button').hide();
                    }
                }
            });
        });
    });
    </script>
</body>
</html>
